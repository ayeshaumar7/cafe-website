<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Ayfa's Cafe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --brown-dark: #5c3a29;
      --gold:       #c9a84c;
      --cream:      #f5ede3;
    }
    .bg-brown      { background-color: var(--brown-dark) !important; }
    .bg-cream      { background-color: var(--cream)      !important; }
    .text-gold     { color: var(--gold)  !important; }
    .text-brown    { color: var(--brown-dark) !important; }
    .border-gold   { border-color: var(--gold) !important; }
    .navbar-brand  { color: var(--gold) !important; }
    .nav-link      { color: var(--cream) !important; }
    .nav-link:hover, .nav-link.active { color: var(--gold) !important; }
    .card-top-gold { border-top: 3px solid var(--gold) !important; }
  </style>
</head>
<body class="bg-cream">
<!-- NAVBAR -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-brown">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <a href="index.html" class="text-decoration-none me-3" style="color:#f5ede3; font-size: 1.5rem;">
          &#8592;
        </a>
        <img src="https://i.postimg.cc/mkTnnqGq/Whats-App-Image-2026-04-20-at-23-47-02.jpg" alt="Logo"
        style="height:40px; border-radius:50%;">
        <a class="navbar-brand fw-bold ms-2" href="#" style="color: #ffffff !important;">
        Ayfah's Café
        </a>
      </div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="menu-1.html">Menu</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="aboutus-1.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact-1.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="bg-brown text-white text-center py-5">
    <div class="container py-3">
      <h1 class="display-4 fw-bold mb-3 text-white">Contact Us</h1>
      <p class="lead text-gold mb-0">We'd love to hear from you</p>
      <hr class="border-gold opacity-75 w-25 mx-auto mt-3"/>
    </div>
  </div>

  <!-- INFO CARDS -->
  <section class="py-5 bg-cream">
    <div class="container">
      <div class="row g-4 justify-content-center">

        <!-- Phone -->
        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0 card-top-gold text-center p-3 bg-white">
            <div class="card-body">
              <div class="fs-1 mb-3">📞</div>
              <h5 class="card-title fw-bold text-brown">Phone</h5>
              <p class="card-text text-brown opacity-75">+92 321 000 0000</p>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0 card-top-gold text-center p-3 bg-white">
            <div class="card-body">
              <div class="fs-1 mb-3">✉️</div>
              <h5 class="card-title fw-bold text-brown">Email</h5>
              <p class="card-text text-brown opacity-75">hello@ayfahscafe.com</p>
            </div>
          </div>
        </div>

        <!-- Opening Hours -->
        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0 card-top-gold text-center p-3 bg-white">
            <div class="card-body">
              <div class="fs-1 mb-3">🕐</div>
              <h5 class="card-title fw-bold text-brown">Opening Hours</h5>
              <table class="table table-sm table-borderless mb-0 text-brown opacity-75">
                <tbody>
                  <tr>
                    <td class="text-start">Mon – Fri</td>
                    <td class="text-end fw-semibold">8AM – 9PM</td>
                  </tr>
                  <tr>
                    <td class="text-start">Saturday</td>
                    <td class="text-end fw-semibold">9AM – 11PM</td>
                  </tr>
                  <tr>
                    <td class="text-start">Sunday</td>
                    <td class="text-end fw-semibold">9AM – 11PM</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-brown text-center py-4">
    <p class="mb-0 text-gold">© 2025 Ayfah's Cafe · Made with ☕ and love</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
